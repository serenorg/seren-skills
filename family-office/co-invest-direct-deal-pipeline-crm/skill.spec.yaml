skill: co-invest-direct-deal-pipeline-crm
description: "Family office: Standardize direct and co-investment intake, policy scoring, stage gates, artifact tracking, and post-close milestone monitoring."
triggers:
  - intake direct deal pipeline
  - score co-invest opportunities
  - run direct investment stage gates
  - produce pipeline health roll-up
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  event_id:
    type: string
    description: Stable id for the event, obligation, document, alert, payment, filing, or work item.
  subject:
    type: string
    description: Human-readable event subject used in audit and review packets.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  approval_confirmed:
    type: boolean
    description: Set true only after the responsible human approves the staged action.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  gmail:
    kind: seren_publisher
    publisher: gmail
  drive:
    kind: seren_publisher
    publisher: google-drive
  docs:
    kind: seren_publisher
    publisher: google-docs
  docreader:
    kind: seren_publisher
    publisher: seren-docreader
  sheets:
    kind: seren_publisher
    publisher: google-sheets
  calendar:
    kind: seren_publisher
    publisher: google-calendar
state:
  deal_intake:
    kind: serendb
    database: family_office_co_invest_direct_deal_pipeline_crm
    table: deal_intake
  investment_policy_rubric:
    kind: serendb
    database: family_office_co_invest_direct_deal_pipeline_crm
    table: investment_policy_rubric
  deal_scores:
    kind: serendb
    database: family_office_co_invest_direct_deal_pipeline_crm
    table: deal_scores
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_event
      use: transform.normalize_operator_event
      with:
        event_id: "{event_id}"
        subject: "{subject}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-co-invest-direct-deal-pipeline-crm
          database: family_office_co_invest_direct_deal_pipeline_crm
    - id: load_operator_state
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select * from deal_intake limit 100
    - id: ingest_source_artifacts
      use: connector.gmail.get
      with:
        path: /dry-run/source-artifacts
        body:
          dry_run_to: "{dry_run_to}"
          sample_subject: "Three inbound co-investment opportunities for IC1 screening"
    - id: evaluate_skill_outputs
      use: transform.evaluate_family_office_operator_event
      with:
        gate: "advancing to IC, requesting information, allocation, close, and post-close external follow-up require human approval"
        required_outputs:
          - ranked_deal_queue
          - screen_recommendations
          - stage_gate_status
          - required_artifacts
          - pipeline_health_rollup
          - post_close_milestone_alerts
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_audit_events
    - id: create_review_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_review_tasks
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: evaluate_skill_outputs
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_review_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - functional dry-run returns all_green
    - live execution requires dual approval gate
publish:
  org: family-office
  slug: co-invest-direct-deal-pipeline-crm
metadata:
  category: family-office-operator
  family_office_category: "Investment Operations"
  priority: P1
  cadence: daily-inbound-deal-intake-weekly-pipeline-rollup-quarterly-health-review
  issue: "943"
