skill: sfo-vs-mfo-operating-model-evaluator
description: "Family office: Evaluate whether to stay single-family office, hybridize, or join a multi-family office using cost, service, technology, and succession-resilience scoring."
triggers:
  - evaluate SFO versus MFO
  - compare family office operating model
  - score succession resilience
  - benchmark multi-family office offerings
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  event_id:
    type: string
    description: Stable id for the event, obligation, document, alert, payment, filing, or work item.
  subject:
    type: string
    description: Human-readable event subject used in audit and review packets.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  approval_confirmed:
    type: boolean
    description: Set true only after the responsible human approves the staged action.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  drive:
    kind: seren_publisher
    publisher: google-drive
  docs:
    kind: seren_publisher
    publisher: google-docs
  sheets:
    kind: seren_publisher
    publisher: google-sheets
  search:
    kind: seren_publisher
    publisher: perplexity
  exa:
    kind: seren_publisher
    publisher: exa
state:
  operating_cost_model:
    kind: serendb
    database: family_office_sfo_vs_mfo_operating_model_evaluator
    table: operating_cost_model
  staffing_capability_matrix:
    kind: serendb
    database: family_office_sfo_vs_mfo_operating_model_evaluator
    table: staffing_capability_matrix
  benchmarked_mfo_offerings:
    kind: serendb
    database: family_office_sfo_vs_mfo_operating_model_evaluator
    table: benchmarked_mfo_offerings
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_event
      use: transform.normalize_operator_event
      with:
        event_id: "{event_id}"
        subject: "{subject}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-sfo-vs-mfo-operating-model-evaluator
          database: family_office_sfo_vs_mfo_operating_model_evaluator
    - id: load_operator_state
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select * from operating_cost_model limit 100
    - id: ingest_source_artifacts
      use: connector.drive.get
      with:
        path: /dry-run/source-artifacts
        body:
          dry_run_to: "{dry_run_to}"
          sample_subject: "$850M multi-entity family office operating model review"
    - id: evaluate_skill_outputs
      use: transform.evaluate_family_office_operator_event
      with:
        gate: "vendor contact, migration commitments, and staff changes require human approval"
        required_outputs:
          - cost_to_serve_model
          - service_level_gap_analysis
          - technology_gap_analysis
          - succession_scorecard
          - recommendation_memo
          - benchmarked_mfo_offerings
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_audit_events
    - id: create_review_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_review_tasks
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: evaluate_skill_outputs
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_review_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - functional dry-run returns all_green
    - live execution requires dual approval gate
publish:
  org: family-office
  slug: sfo-vs-mfo-operating-model-evaluator
metadata:
  category: family-office-operator
  family_office_category: "Complexity Management"
  priority: P1
  cadence: annual-operating-model-review-or-keyperson-event
  issue: "942"
