skill: multi-entity-stress-scenario-modeler
description: "Family office: Run rates, market, liquidity, and cap-call stress scenarios across trusts, foundations, operating companies, holdcos, and intercompany funding paths."
triggers:
  - run multi-entity stress scenario
  - model cap-call cluster
  - check liquidity policy bands
  - produce IC scenario book
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  event_id:
    type: string
    description: Stable id for the event, obligation, document, alert, payment, filing, or work item.
  subject:
    type: string
    description: Human-readable event subject used in audit and review packets.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  approval_confirmed:
    type: boolean
    description: Set true only after the responsible human approves the staged action.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  drive:
    kind: seren_publisher
    publisher: google-drive
  docs:
    kind: seren_publisher
    publisher: google-docs
  sheets:
    kind: seren_publisher
    publisher: google-sheets
  docreader:
    kind: seren_publisher
    publisher: seren-docreader
state:
  entity_map:
    kind: serendb
    database: family_office_multi_entity_stress_scenario_modeler
    table: entity_map
  position_snapshots:
    kind: serendb
    database: family_office_multi_entity_stress_scenario_modeler
    table: position_snapshots
  commitment_cashflows:
    kind: serendb
    database: family_office_multi_entity_stress_scenario_modeler
    table: commitment_cashflows
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_event
      use: transform.normalize_operator_event
      with:
        event_id: "{event_id}"
        subject: "{subject}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-multi-entity-stress-scenario-modeler
          database: family_office_multi_entity_stress_scenario_modeler
    - id: load_operator_state
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select * from entity_map limit 100
    - id: ingest_source_artifacts
      use: connector.drive.get
      with:
        path: /dry-run/source-artifacts
        body:
          dry_run_to: "{dry_run_to}"
          sample_subject: "Three-entity cap-call cluster stress"
    - id: evaluate_skill_outputs
      use: transform.evaluate_family_office_operator_event
      with:
        gate: "funding calls, entity transfers, rebalancing, and external manager instructions require human approval"
        required_outputs:
          - scenario_outputs
          - liquidity_gap_alerts
          - policy_pass_fail_book
          - interentity_funding_paths
          - commitment_ledger_context
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_audit_events
    - id: create_review_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_review_tasks
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: evaluate_skill_outputs
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_review_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - functional dry-run returns all_green
    - live execution requires dual approval gate
publish:
  org: family-office
  slug: multi-entity-stress-scenario-modeler
metadata:
  category: family-office-operator
  family_office_category: "Investment Operations"
  priority: P1
  cadence: monthly-scenario-refresh-quarterly-ic-book-event-driven-cap-call-cluster
  issue: "949"
