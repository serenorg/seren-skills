skill: forward-looking-portfolio-risk-alerts
description: "Family office: Monitor news, sanctions, regulator, and macro feeds, map events to current positions, and rank forward-looking portfolio risk alerts with proposed actions."
triggers:
  - monitor forward-looking portfolio risk
  - map news to family positions
  - rank geopolitical risk alerts
  - run portfolio risk headlights
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  event_id:
    type: string
    description: Stable id for the event, obligation, document, alert, payment, filing, or work item.
  subject:
    type: string
    description: Human-readable event subject used in audit and review packets.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  approval_confirmed:
    type: boolean
    description: Set true only after the responsible human approves the staged action.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  drive:
    kind: seren_publisher
    publisher: google-drive
  sheets:
    kind: seren_publisher
    publisher: google-sheets
  search:
    kind: seren_publisher
    publisher: perplexity
  exa:
    kind: seren_publisher
    publisher: exa
  news:
    kind: seren_publisher
    publisher: real-time-news
  sanctions:
    kind: seren_publisher
    publisher: opensanctions
  cron:
    kind: seren_publisher
    publisher: seren-cron
state:
  position_event_map:
    kind: serendb
    database: family_office_forward_looking_portfolio_risk_alerts
    table: position_event_map
  risk_alerts:
    kind: serendb
    database: family_office_forward_looking_portfolio_risk_alerts
    table: risk_alerts
  source_citations:
    kind: serendb
    database: family_office_forward_looking_portfolio_risk_alerts
    table: source_citations
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_event
      use: transform.normalize_operator_event
      with:
        event_id: "{event_id}"
        subject: "{subject}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-forward-looking-portfolio-risk-alerts
          database: family_office_forward_looking_portfolio_risk_alerts
    - id: load_operator_state
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select * from position_event_map limit 100
    - id: ingest_source_artifacts
      use: connector.drive.get
      with:
        path: /dry-run/source-artifacts
        body:
          dry_run_to: "{dry_run_to}"
          sample_subject: "Synthetic sanctions headline impacting portfolio issuer"
    - id: evaluate_skill_outputs
      use: transform.evaluate_family_office_operator_event
      with:
        gate: "hedge, exit, manager outreach, or watch-list handoff requires human approval before execution"
        required_outputs:
          - ranked_risk_alerts
          - position_links
          - source_citations
          - proposed_action_set
          - threshold_audit_trail
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_audit_events
    - id: create_review_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_review_tasks
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: evaluate_skill_outputs
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_review_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - functional dry-run returns all_green
    - live execution requires dual approval gate
publish:
  org: family-office
  slug: forward-looking-portfolio-risk-alerts
metadata:
  category: family-office-operator
  family_office_category: "Risk Management"
  priority: P1
  cadence: hourly-event-scan-daily-risk-digest-weekly-threshold-review
  issue: "939"
