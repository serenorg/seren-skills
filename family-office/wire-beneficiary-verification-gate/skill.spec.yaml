skill: wire-beneficiary-verification-gate
description: "Family office: Fraud and wire-verification control operator that screens outbound payment instructions against a known-good beneficiary register, halts new or changed banking details, creates verification tasks, and records a dry-run-first audit trail before any safe-to-pay mark."
triggers:
  - screen a wire beneficiary
  - verify payment instructions before wire
  - check vendor bank change against known good register
  - run the family office wire verification gate
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  instruction_id:
    type: string
    description: Stable id for the payment instruction, invoice, capital call, or vendor bank-change notice.
  counterparty_name:
    type: string
    description: Beneficiary, vendor, GP, or payee name from the instruction.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  allow_register_write:
    type: boolean
    description: Operator approval flag for writing a new known-good register row.
    default: false
  allow_safe_to_pay:
    type: boolean
    description: Operator approval flag for marking a halted instruction safe to pay after out-of-band verification.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  gmail:
    kind: seren_publisher
    publisher: gmail
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  browser:
    kind: seren_publisher
    publisher: browserbase
  cron:
    kind: seren_publisher
    publisher: seren-cron
state:
  beneficiary_register:
    kind: serendb
    database: family_office_wire_beneficiary_verification_gate
    table: beneficiary_register
  payment_screen_events:
    kind: serendb
    database: family_office_wire_beneficiary_verification_gate
    table: payment_screen_events
  verification_tasks:
    kind: serendb
    database: family_office_wire_beneficiary_verification_gate
    table: verification_tasks
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_instruction
      use: transform.normalize_payment_instruction
      with:
        instruction_id: "{instruction_id}"
        counterparty_name: "{counterparty_name}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-wire-beneficiary-verification-gate
          database: family_office_wire_beneficiary_verification_gate
    - id: load_known_good_register
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select beneficiary_hash, bank_fingerprint, callback_phone_hash, last_verified_at from beneficiary_register
    - id: scan_payment_sources
      use: connector.gmail.get
      with:
        path: /gmail/v1/users/me/messages
        body:
          query: "newer_than:7d (wire OR invoice OR capital call OR bank change)"
          dry_run_to: "{dry_run_to}"
    - id: screen_instruction
      use: transform.screen_against_known_good_register
      with:
        instruction_from: normalize_instruction
        register_from: load_known_good_register
        halt_on_new_payee: true
        halt_on_bank_change: true
        require_out_of_band_callback: true
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: screen_instruction
          table: payment_screen_events
    - id: create_verification_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: screen_instruction
          table: verification_tasks
          require_known_good_callback: true
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: screen_instruction
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_verification_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - dry-run changed-bank instruction halts
    - live safe-to-pay requires dual approval gate
publish:
  org: family-office
  slug: wire-beneficiary-verification-gate
metadata:
  category: family-office-operator
  priority: P0
  cadence: continuous-on-event-daily-digest
  issue: "852"
