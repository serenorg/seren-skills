skill: multi-custodian-portfolio-aggregator-nl-qa
description: "Family office: Consolidate custodian, fund-admin, direct-investment, banking, and operating exposure feeds into a look-through position table with source-cited natural-language Q&A."
triggers:
  - aggregate custodian positions
  - answer portfolio look-through question
  - find reconciliation breaks
  - run multi-custodian portfolio QA
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  event_id:
    type: string
    description: Stable id for the event, obligation, document, alert, payment, filing, or work item.
  subject:
    type: string
    description: Human-readable event subject used in audit and review packets.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  approval_confirmed:
    type: boolean
    description: Set true only after the responsible human approves the staged action.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  drive:
    kind: seren_publisher
    publisher: google-drive
  docs:
    kind: seren_publisher
    publisher: google-docs
  docreader:
    kind: seren_publisher
    publisher: seren-docreader
  sheets:
    kind: seren_publisher
    publisher: google-sheets
  search:
    kind: seren_publisher
    publisher: perplexity
state:
  source_file_manifest:
    kind: serendb
    database: family_office_multi_custodian_portfolio_aggregator_nl_qa
    table: source_file_manifest
  unified_position_table:
    kind: serendb
    database: family_office_multi_custodian_portfolio_aggregator_nl_qa
    table: unified_position_table
  lookthrough_holdings:
    kind: serendb
    database: family_office_multi_custodian_portfolio_aggregator_nl_qa
    table: lookthrough_holdings
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_event
      use: transform.normalize_operator_event
      with:
        event_id: "{event_id}"
        subject: "{subject}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-multi-custodian-portfolio-aggregator-nl-qa
          database: family_office_multi_custodian_portfolio_aggregator_nl_qa
    - id: load_operator_state
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select * from source_file_manifest limit 100
    - id: ingest_source_artifacts
      use: connector.drive.get
      with:
        path: /dry-run/source-artifacts
        body:
          dry_run_to: "{dry_run_to}"
          sample_subject: "Brazilian sovereign credit exposure through all funds"
    - id: evaluate_skill_outputs
      use: transform.evaluate_family_office_operator_event
      with:
        gate: "source-data writebacks, reconciliation adjustments, and principal distribution require human approval"
        required_outputs:
          - unified_position_table
          - lookthrough_exposure_rollup
          - nl_qa_answer_with_source_lines
          - reconciliation_break_list
          - stale_data_alerts
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_audit_events
    - id: create_review_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_review_tasks
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: evaluate_skill_outputs
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_review_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - functional dry-run returns all_green
    - live execution requires dual approval gate
publish:
  org: family-office
  slug: multi-custodian-portfolio-aggregator-nl-qa
metadata:
  category: family-office-operator
  family_office_category: "Investment Operations"
  priority: P1
  cadence: daily-source-refresh-weekly-reconciliation-monthly-ic-qa
  issue: "938"
