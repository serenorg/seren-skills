skill: board-pack-and-minutes-auto-drafter
description: "Family office: Draft board packs, minutes, decisions logs, and owner-scored action items from meeting transcripts with mandatory human review."
triggers:
  - draft minutes from transcript
  - build family meeting board pack
  - extract decisions and action owners
  - stage meeting packet for approval
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  event_id:
    type: string
    description: Stable id for the event, obligation, document, alert, payment, filing, or work item.
  subject:
    type: string
    description: Human-readable event subject used in audit and review packets.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  approval_confirmed:
    type: boolean
    description: Set true only after the responsible human approves the staged action.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  gmail:
    kind: seren_publisher
    publisher: gmail
  drive:
    kind: seren_publisher
    publisher: google-drive
  docs:
    kind: seren_publisher
    publisher: google-docs
  docreader:
    kind: seren_publisher
    publisher: seren-docreader
  calendar:
    kind: seren_publisher
    publisher: google-calendar
  models:
    kind: seren_publisher
    publisher: seren-models
state:
  transcript_ingest:
    kind: serendb
    database: family_office_board_pack_and_minutes_auto_drafter
    table: transcript_ingest
  minutes_drafts:
    kind: serendb
    database: family_office_board_pack_and_minutes_auto_drafter
    table: minutes_drafts
  decisions_log:
    kind: serendb
    database: family_office_board_pack_and_minutes_auto_drafter
    table: decisions_log
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_event
      use: transform.normalize_operator_event
      with:
        event_id: "{event_id}"
        subject: "{subject}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-board-pack-and-minutes-auto-drafter
          database: family_office_board_pack_and_minutes_auto_drafter
    - id: load_operator_state
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select * from transcript_ingest limit 100
    - id: ingest_source_artifacts
      use: connector.gmail.get
      with:
        path: /dry-run/source-artifacts
        body:
          dry_run_to: "{dry_run_to}"
          sample_subject: "Family council quarterly meeting transcript"
    - id: evaluate_skill_outputs
      use: transform.evaluate_family_office_operator_event
      with:
        gate: "publishing, distribution, and permanent governance-record updates require human approval"
        required_outputs:
          - draft_minutes_doc
          - action_item_list
          - decisions_log
          - board_pack_appendix
          - followup_status
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_audit_events
    - id: create_review_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_review_tasks
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: evaluate_skill_outputs
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_review_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - functional dry-run returns all_green
    - live execution requires dual approval gate
publish:
  org: family-office
  slug: board-pack-and-minutes-auto-drafter
metadata:
  category: family-office-operator
  family_office_category: "Governance"
  priority: P1
  cadence: event-driven-after-meeting-transcript-ingest
  issue: "944"
