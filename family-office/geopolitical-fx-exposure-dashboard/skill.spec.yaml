skill: geopolitical-fx-exposure-dashboard
description: "Family office: Compute FX net exposure, country and sanctions exposure, supply-chain concentration, and dry-run hedge recommendations against policy bands."
triggers:
  - calculate family FX exposure
  - screen country and sanctions exposure
  - draft hedging recommendations
  - run geopolitical exposure dashboard
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  event_id:
    type: string
    description: Stable id for the event, obligation, document, alert, payment, filing, or work item.
  subject:
    type: string
    description: Human-readable event subject used in audit and review packets.
  dry_run_to:
    type: string
    description: Review mailbox used for dry-run digest routing.
    default: taariq@serendb.com
  approval_confirmed:
    type: boolean
    description: Set true only after the responsible human approves the staged action.
    default: false
secrets:
  - SEREN_API_KEY
connectors:
  storage:
    kind: seren_publisher
    publisher: seren-db
  passwords:
    kind: seren_publisher
    publisher: seren-passwords
  outlook:
    kind: seren_publisher
    publisher: microsoft-outlook
  drive:
    kind: seren_publisher
    publisher: google-drive
  sheets:
    kind: seren_publisher
    publisher: google-sheets
  docreader:
    kind: seren_publisher
    publisher: seren-docreader
  search:
    kind: seren_publisher
    publisher: perplexity
  exa:
    kind: seren_publisher
    publisher: exa
  news:
    kind: seren_publisher
    publisher: real-time-news
  sanctions:
    kind: seren_publisher
    publisher: opensanctions
state:
  position_exposure:
    kind: serendb
    database: family_office_geopolitical_fx_exposure_dashboard
    table: position_exposure
  operating_company_revenue:
    kind: serendb
    database: family_office_geopolitical_fx_exposure_dashboard
    table: operating_company_revenue
  country_exposure_map:
    kind: serendb
    database: family_office_geopolitical_fx_exposure_dashboard
    table: country_exposure_map
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 0
workflow:
  steps:
    - id: normalize_event
      use: transform.normalize_operator_event
      with:
        event_id: "{event_id}"
        subject: "{subject}"
    - id: resolve_seren_passwords_context
      use: connector.passwords.post
      with:
        path: /mcp/passwords_vaults_list
        body:
          purpose: resolve_named_secret_references
          forbid_vault_ids_from_config: true
    - id: ensure_operator_database
      use: connector.storage.post
      with:
        path: /projects
        body:
          project_name: family-office-geopolitical-fx-exposure-dashboard
          database: family_office_geopolitical_fx_exposure_dashboard
    - id: load_operator_state
      use: connector.storage.post
      with:
        path: /query
        body:
          step: ensure_operator_database
          query: select * from position_exposure limit 100
    - id: ingest_source_artifacts
      use: connector.drive.get
      with:
        path: /dry-run/source-artifacts
        body:
          dry_run_to: "{dry_run_to}"
          sample_subject: "EUR cash and operating company revenue exposure review"
    - id: evaluate_skill_outputs
      use: transform.evaluate_family_office_operator_event
      with:
        gate: "hedge trade routing, position changes, and external advisor instructions require separate human approval"
        required_outputs:
          - fx_net_exposure
          - country_exposure_dashboard
          - sanctions_screen
          - supply_chain_flags
          - hedge_trade_recommendations
          - policy_band_check
    - id: persist_audit_event
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_audit_events
    - id: create_review_task
      use: connector.storage.post
      with:
        path: /query
        body:
          body_from: evaluate_skill_outputs
          table: operator_review_tasks
    - id: send_dry_run_digest
      use: connector.outlook.post
      with:
        path: /me/sendMail
        body:
          dry_run_to: "{dry_run_to}"
          body_from: evaluate_skill_outputs
          review_gate_only: true
    - id: summary
      use: transform.render_operator_summary
      with:
        depends_on:
          - persist_audit_event
          - create_review_task
          - send_dry_run_digest
tests:
  quick:
    - validate spec
  smoke:
    - functional dry-run returns all_green
    - live execution requires dual approval gate
publish:
  org: family-office
  slug: geopolitical-fx-exposure-dashboard
metadata:
  category: family-office-operator
  family_office_category: "Risk Management"
  priority: P1
  cadence: daily-exposure-refresh-weekly-policy-band-review-event-driven-sanctions-screen
  issue: "947"
