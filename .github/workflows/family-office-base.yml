name: Enforce family-office base

on:
  pull_request:
    paths:
      - "family-office/_base/**"
      - "family-office/SKILL.md"
      - ".github/workflows/family-office-base.yml"
  push:
    branches:
      - main
    paths:
      - "family-office/_base/**"
      - "family-office/SKILL.md"
      - ".github/workflows/family-office-base.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install family-office-base + test deps
        working-directory: family-office/_base
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run critical test suite (offline)
        working-directory: family-office/_base
        run: pytest -q

  forbid-direct-run-sql-in-skill-code:
    # Guard rail: skill code must never import run_sql / run_sql_transaction
    # directly. Only family_office_base.audit_query and run_schema_guard may
    # touch the database.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any family-office skill imports raw run_sql
        run: |
          if grep -R --line-number --include='*.py' \
              -E 'from +mcp.* import +run_sql|^import +mcp.*run_sql' \
              family-office/ | grep -v '_base/' ; then
            echo "::error::Skill code may not import run_sql directly; use audit_query."
            exit 1
          fi
