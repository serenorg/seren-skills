skill: prophet-polymarket-edge
description: Read-only Tranche 1 watchlist of Prophet markets to create plus Polymarket consensus context. Surface A loss audit is post-v1; this skill ships Surface B (watchlist) and Surface C (consensus context) only.
triggers:
  - run a Prophet Tranche 1 watchlist
  - show Polymarket consensus context for divergent markets
  - find markets present on Polymarket but not yet on Prophet
  - check the Polymarket vs cross-platform consensus on markets the user follows
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  command:
    type: string
    description: Top-level skill command.
    enum:
      - run
      - status
      - purge
    default: run
  json_output:
    type: boolean
    description: Return machine-readable output when true.
    default: false
  watchlist_limit:
    type: integer
    description: Maximum number of Surface B watchlist rows to render.
    min: 1
    max: 25
    default: 5
  consensus_context_limit:
    type: integer
    description: Maximum number of Surface C consensus-context rows to render.
    min: 1
    max: 25
    default: 10
  min_platforms:
    type: integer
    description: Minimum cross-platform consensus venue count for divergence query.
    min: 2
    max: 10
    default: 3
  min_liquidity_usd:
    type: integer
    description: Minimum Polymarket liquidity floor in USD for divergence query.
    min: 0
    default: 10000
secrets:
  - SEREN_API_KEY
  - PROPHET_SESSION_TOKEN
connectors:
  storage:
    kind: seren_publisher
    publisher: serendb
  polymarket_intelligence:
    kind: seren_publisher
    publisher: seren-polymarket-intelligence
state:
  runs:
    kind: serendb
    database: prophet_polymarket_edge
    table: audit_runs
  recommendations:
    kind: serendb
    database: prophet_polymarket_edge
    table: recommendations
  telemetry:
    kind: serendb
    database: prophet_polymarket_edge
    table: telemetry_events
policies:
  dry_run_default: true
  idempotency_required: true
  auto_provision: true
  execution_disabled: true
workflow:
  steps:
    - id: bootstrap_storage
      use: connector.storage.bootstrap
    - id: fetch_prophet_open_markets
      use: transform.fetch_prophet_open_markets
      with:
        from_step: bootstrap_storage
    - id: fetch_polymarket_divergence
      use: connector.polymarket_intelligence.get
      with:
        path: /api/oracle/divergence
        query:
          min_platforms: "{min_platforms}"
          min_liquidity_usd: "{min_liquidity_usd}"
        from_step: bootstrap_storage
    - id: fetch_polymarket_consensus_batch
      use: connector.polymarket_intelligence.get
      with:
        path: /api/oracle/consensus/batch
        from_step: fetch_polymarket_divergence
    - id: compute_watchlist_candidates
      use: transform.compute_watchlist_candidates
      with:
        watchlist_limit: "{watchlist_limit}"
        from_step: fetch_polymarket_consensus_batch
    - id: render_watchlist
      use: transform.render_watchlist
      with:
        from_step: compute_watchlist_candidates
    - id: render_consensus_context
      use: transform.render_consensus_context
      with:
        consensus_context_limit: "{consensus_context_limit}"
        from_step: fetch_polymarket_consensus_batch
    - id: persist_recommendations
      use: connector.storage.upsert
      with:
        tables:
          - audit_runs
          - recommendations
          - telemetry_events
        from_step: render_consensus_context
    - id: render_summary
      use: transform.render_report
      with:
        json_output: "{json_output}"
        from_step: persist_recommendations
tests:
  quick:
    - validates_command_enum
    - bounds_watchlist_limit
    - bounds_consensus_context_limit
  smoke:
    - schema_ddl_is_idempotent
    - watchlist_excludes_prophet_open_markets
    - watchlist_renders_consensus_context_block
    - watchlist_suppresses_deep_links_when_unauthenticated
    - consensus_context_uses_verbatim_labels
    - consensus_context_does_not_call_actionable
publish:
  org: prophet
  slug: prophet-polymarket-edge
metadata:
  category: market-intelligence
  product_role: launch-contingency
  family: prophet-v1
  launch_date: "2026-05-01"
